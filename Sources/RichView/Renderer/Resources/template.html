<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --text-color: #1a1a1a;
            --code-bg: rgba(0, 0, 0, 0.05);
            --border-color: rgba(0, 0, 0, 0.12);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --text-color: #e8e8e8;
                --code-bg: rgba(255, 255, 255, 0.08);
                --border-color: rgba(255, 255, 255, 0.12);
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans",
                         -apple-system, BlinkMacSystemFont, sans-serif !important;
            font-size: 15px;
            line-height: 1.75;
            color: var(--text-color);
            background: transparent;
            padding: 20px 24px;
            -webkit-font-smoothing: antialiased;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        /* MathJax CHTML: override text-mode to Gothic */
        mjx-container {
            overflow-x: auto;
            overflow-y: hidden;
        }
        mjx-container[display="true"] {
            margin: 0.8em 0 !important;
            padding: 4px 0;
        }
        /* \text{}, \mathrm{} 等の文字部分をゴシックに */
        mjx-mtext, mjx-mtext * {
            font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif !important;
        }
        /* MathJax error: subdued */
        mjx-merror {
            color: var(--text-color) !important;
            opacity: 0.6;
            font-style: italic;
        }
        /* Typography */
        p { margin: 0.5em 0; }
        h1 { font-size: 1.4em; margin: 1em 0 0.4em; font-weight: 700; }
        h2 { font-size: 1.2em; margin: 0.8em 0 0.3em; font-weight: 700; }
        h3 { font-size: 1.05em; margin: 0.6em 0 0.2em; font-weight: 600; }
        strong { font-weight: 700; }
        /* Code */
        pre {
            background: var(--code-bg);
            padding: 12px 16px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 0.7em 0;
            line-height: 1.5;
        }
        code {
            font-family: "SF Mono", "Menlo", "Monaco", monospace;
            font-size: 0.88em;
        }
        :not(pre) > code {
            background: var(--code-bg);
            padding: 2px 5px;
            border-radius: 3px;
        }
        /* Lists */
        ul, ol { padding-left: 1.5em; margin: 0.4em 0; }
        li { margin: 0.2em 0; }
        /* Blockquote */
        blockquote {
            border-left: 3px solid var(--border-color);
            padding-left: 16px;
            margin: 0.7em 0;
            opacity: 0.85;
        }
        /* Table */
        table {
            border-collapse: collapse;
            margin: 0.7em 0;
            width: 100%;
        }
        th, td {
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            text-align: left;
        }
        th { font-weight: 600; }
        hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 1em 0;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb {
            background: rgba(128,128,128,0.3);
            border-radius: 3px;
        }
    </style>
    <script>
        // MathJax configuration — SVG output (Computer Modern font, no external files)
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)'], ['$', '$']],
                displayMath: [['\\[', '\\]'], ['$$', '$$']],
                processEscapes: false,
                packages: {'[+]': ['ams', 'boldsymbol', 'cancel', 'color',
                                   'enclose', 'mhchem', 'physics']}
            },
            svg: {
                fontCache: 'local',
                scale: 1.05,
                mtextInheritFont: true,
                merrorInheritFont: true
            },
            startup: {
                typeset: false
            }
        };
    </script>
</head>
<body>
    <div id="content"></div>
    <script src="marked.min.js"></script>
    <script src="mathjax-tex-svg.js"></script>
    <script>
        let lastContent = '';

        function cleanupMath(tex) {
            tex = tex.replace(/\n\s*\n/g, ' \n');
            tex = tex.replace(/\\left\s*[\[\](){}|.]\s*$/, '');
            tex = tex.replace(/^\\right\s*[\[\](){}|.]\s*/, '');
            return tex;
        }

        function renderContent(text) {
            if (text === lastContent) return;
            lastContent = text;

            // Strip code fences (LLMs often wrap output in ```latex ```)
            text = text.replace(/^```(?:latex|tex|math)?\s*\n?([\s\S]*?)\n?\s*```\s*$/g, '$1');
            text = text.replace(/```(?:latex|tex|math)\s*\n([\s\S]*?)\n\s*```/g, '$1');

            const el = document.getElementById('content');

            // Protect math from Markdown parser
            const mathBlocks = [];
            let processed = text;

            processed = processed.replace(/\\\[([\s\S]*?)\\\]/g, (m, inner) => {
                mathBlocks.push('\\[' + cleanupMath(inner) + '\\]');
                return '<!--RVMATH' + (mathBlocks.length - 1) + '-->';
            });
            processed = processed.replace(/\$\$([\s\S]*?)\$\$/g, (m, inner) => {
                mathBlocks.push('$$' + cleanupMath(inner) + '$$');
                return '<!--RVMATH' + (mathBlocks.length - 1) + '-->';
            });
            processed = processed.replace(/\\\(([\s\S]*?)\\\)/g, (m) => {
                mathBlocks.push(m);
                return '<!--RVMATH' + (mathBlocks.length - 1) + '-->';
            });
            processed = processed.replace(/\$([^\$\n]+?)\$/g, (m) => {
                mathBlocks.push(m);
                return '<!--RVMATH' + (mathBlocks.length - 1) + '-->';
            });

            let html = marked.parse(processed, { breaks: true, gfm: true });
            html = html.replace(/<!--RVMATH(\d+)-->/g, (_, idx) => mathBlocks[parseInt(idx)]);

            // Clear previous MathJax and render
            MathJax.startup.document.clear();
            MathJax.startup.document.updateDocument();
            el.innerHTML = html;

            MathJax.typesetPromise([el]).catch(function(err) {
                console.warn('[RichView] MathJax error:', err);
            });
        }

        window.pageReady = true;
    </script>
</body>
</html>
